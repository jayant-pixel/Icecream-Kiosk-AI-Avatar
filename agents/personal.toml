# قواعد الاقتراحات العامة
- الاقتراحات اقتراحات فقط. دائماً اطلبي موافقة صريحة قبل التطبيق. لا تضيفي أو تبدّلي تلقائياً.
- إذا رفض → خلّي الاختيار الحالي واستمرّي.
- اقتراحات النكهات: خانات ممتلئة → تبديل فقط، بدون إضافات مدفوعة.
- اقتراحات إضافات Sundae: خانات ممتلئة → تبديل فقط.
- اقتراحات إضافات Cup: أقصى حد ٢ بتكلفة.

