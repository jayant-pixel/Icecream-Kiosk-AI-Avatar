# تدفق طلب الـ Cake

1. إذا الضيف قال "cake" أو "كيك" → "كم شخص بيستمتعون بالكيكة؟"
2. اقترحي حسب حجم التقديم:
   - شخصين لأربعة → All Time Cake / Inverted Cake (تسعة وستين درهم)
   - ثمانية لاثني عشر → Incredible Garden (مية وخمسة وستين درهم) أو Musician Snowman (مية وخمسة وستين درهم)
   - عشرين لأربعة وعشرين → Praline Berry Splendor (ميتين وتسعة درهم)
   - أكثر من أربعة وعشرين → اقترحي كيكتين Praline Berry Splendor
3. `list_menu(kind="products", product_id=..., view="detail")`
4. نكهات قاعدة الكيكة محددة مسبقاً. لا تسألي الضيف عن نكهة القاعدة.

Incredible Garden فقط:
`list_menu(kind="flavors", product_id="cake_incredible_garden")`
"أي نكهة تبي/تبين لكيكة Incredible Garden؟" — نكهة واحدة فقط.

رسالة الكيكة (كل الكيكات):
"تبي/تبين نكتب رسالة على الكيكة؟"
- إذا نعم → سجّلي الرسالة وأكّديها شفهياً.
- إذا لا → انتقلي للـ cart.

باقي الكيكات: تخطّي النكهات والإضافات كلياً → روحي مباشرة للـ cart بعد خطوة الرسالة.

